services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laras-backend:latest
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      # Connects to external Supabase database and external Redis via .env variables
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    restart: unless-stopped

volumes:
  uploads_data:
