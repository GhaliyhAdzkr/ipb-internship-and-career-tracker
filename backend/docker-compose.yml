services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # SECURE SRE PATTERN: No ports exposed to the host system.
    # Redis is only reachable through the internal secure bridge network.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laras-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laras-backend:latest
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      # Connects directly to the external database via DATABASE_URL from .env
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/2}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    restart: unless-stopped
    networks:
      - laras-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: laras-backend:latest
    command: ["celery", "-A", "app_backend.shared.celery", "worker", "--loglevel=info", "-Q", "ai,vacancy,notification,report"]
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/2}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    restart: unless-stopped
    networks:
      - laras-network

networks:
  laras-network:
    driver: bridge

volumes:
  uploads_data:
