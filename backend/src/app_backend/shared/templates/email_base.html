<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
            color: #374151;
            line-height: 1.6;
        }
        .wrapper {
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header {
            padding: 40px 40px 20px 40px;
            text-align: center;
        }
        .header-title {
            color: #002957;
            font-size: 22px;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .content {
            padding: 0 40px 40px 40px;
        }
        .greeting {
            font-size: 16px;
            margin-bottom: 20px;
            color: #111827;
        }
        .message-body {
            font-size: 15px;
            color: #4b5563;
        }
        .divider {
            height: 1px;
            background-color: #f3f4f6;
            margin: 30px 0;
        }
        .footer {
            text-align: center;
            padding-top: 10px;
        }
        .footer-text {
            font-size: 12px;
            color: #9ca3af;
        }
        .btn-container {
            text-align: center;
            margin: 35px 0;
        }
        .btn-action {
            display: inline-block;
            background-color: #002957;
            color: #ffffff !important;
            padding: 14px 32px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
        }
        .raw-link {
            font-size: 13px;
            color: #6b7280;
            word-break: break-all;
            margin-top: 30px;
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <img src="cid:logo" alt="LARAS Logo" style="max-height: 60px; margin-bottom: 20px;">
                <h1 class="header-title">{{ title }}</h1>
            </div>
            
            <div class="content">
                <div class="greeting">Halo <strong>{{ user_name }}</strong>,</div>
                
                <div class="message-body">
                    {{ message }}
                </div>
                
                <div class="divider"></div>
                
                <div class="footer">
                    <p class="footer-text">
                        &copy; {{ year }} LARAS Platform - IPB University.<br>
                        Direktorat Kemahasiswaan & Pengembangan Karir.
                    </p>
                    <p style="font-size: 10px; color: #d1d5db;">{{ timestamp }} WIB</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
